<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>✨ メイド占い屋 シフト表 ✨</title>
  <meta name="description" content="文化祭メイド占い屋のシフト表。担当メイドさんを時間帯別にチェックできます。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ヘッダー -->
  <header class="site-header">
    <div class="stars-bg"></div>
    <div class="header-content">
      <div class="header-deco">✦ ✦ ✦</div>
      <h1 class="site-title">
        <span class="title-icon">🔮</span>
        メイド占い屋
        <span class="title-icon">🔮</span>
      </h1>
      <p class="site-subtitle">シフト表</p>
      <div class="header-deco">✦ ✦ ✦</div>
    </div>
  </header>

  <!-- 日付タブ -->
  <div class="date-tabs">
    <button class="date-tab active" id="tab-512" onclick="switchDay('512')">
      <span class="tab-month">5月</span>
      <span class="tab-day">12日</span>
      <span class="tab-week">土</span>
    </button>
    <button class="date-tab" id="tab-513" onclick="switchDay('513')">
      <span class="tab-month">5月</span>
      <span class="tab-day">13日</span>
      <span class="tab-week">日</span>
    </button>
  </div>

  <!-- メインコンテンツ -->
  <main class="main-content" id="main-content">
    <!-- JSで動的に生成 -->
  </main>

  <!-- モーダル -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
    <div class="modal-card" id="modal-card" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-inner" id="modal-inner"></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
